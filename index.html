<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <title>Modal Runs — Learn the fretboard by playing it</title>
    <meta name="description" content="Learn the guitar fretboard by playing it: play any note and it lights up on the neck in real time. Hold a drone, improvise, and find the modes by ear instead of memorising them. Free." />
    <link rel="canonical" href="https://modalruns.com/" />
    <link rel="alternate" hreflang="en" href="https://modalruns.com/" />
    <link rel="alternate" hreflang="es" href="https://modalruns.com/es/" />
    <link rel="alternate" hreflang="fr" href="https://modalruns.com/fr/" />
    <link rel="alternate" hreflang="it" href="https://modalruns.com/it/" />
    <link rel="alternate" hreflang="pt" href="https://modalruns.com/pt/" />
    <link rel="alternate" hreflang="x-default" href="https://modalruns.com/" />
    <meta name="theme-color" content="#050507" />

    <!-- Fonts: loaded ASYNC (media=print flips to all on load) so first paint
         never waits on a round trip to two third-party font origins — that
         was pinning FCP at ~3.3s on mobile. preconnect still warms both
         connections, and font-display: swap already renders text in the
         fallback first, so this only removes the render-blocking wait, not
         the fonts themselves. <noscript> keeps them for JS-off clients. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />

    <!-- The first-visit mobile modal's monitor shot is the LCP element on
         touch devices, and JS doesn't render it until the bundle runs — so
         its fetch would otherwise start late. Preload it (touch-only, so
         desktop never pays for it) to start it in parallel with the JS. -->
    <link rel="preload" as="image" href="/desktop-nudge-art.webp" media="(hover: none) and (pointer: coarse)" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,800,900&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
      <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,800,900&display=swap" />
    </noscript>

    <!-- Chrome origin trial: WebMCP (utils/webmcp.ts). Registered for
         https://modalruns.com, expires Nov 16 2026 — renew before then or
         the tools silently stop registering (feature-detected, so nothing
         breaks, they just go dormant again). -->
    <meta http-equiv="origin-trial" content="AgMxLFbXJ+ZBXxqAFsfrSO4JVKaieXBbkGjncJ5k7qGuV+AL0XlHiA5FIzGNdq3YhkmMW6L5GJ66TsVvbGyXLg8AAABNeyJvcmlnaW4iOiJodHRwczovL21vZGFscnVucy5jb206NDQzIiwiZmVhdHVyZSI6IldlYk1DUCIsImV4cGlyeSI6MTc5NDg3MzYwMH0=" />

    <!-- Icons. favicon.ico is listed because browsers blind-request /favicon.ico
         regardless of what's declared here. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Installable as a PWA: cuts return-visit friction to an icon tap,
         no code required beyond this manifest — see docs/07-conventions.md
         on client-only scope. -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://modalruns.com/" />
    <meta property="og:site_name" content="Modal Runs" />
    <meta property="og:title" content="Modal Runs — Learn the fretboard by playing it" />
    <meta property="og:description" content="Play any note — it lights up on the neck, in real time. Hold a drone, improvise, find the modes by ear. Free." />
    <!-- JPEG, not PNG: WhatsApp silently drops preview images over ~300KB and the
         PNG was 316KB. This is 103KB, so the card actually renders in chat. -->
    <meta property="og:image" content="https://modalruns.com/og.jpg" />
    <meta property="og:image:secure_url" content="https://modalruns.com/og.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Modal Runs — a fretboard lit up with the notes of a mode" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Modal Runs — Learn the fretboard by playing it" />
    <meta name="twitter:description" content="Play any note — it lights up on the neck, in real time. Find the modes by ear." />
    <meta name="twitter:image" content="https://modalruns.com/og.jpg" />

    <!-- Structured data: tells search/AI crawlers what this IS before any JS
         runs. Kept in sync by hand — this is the one page the build script
         doesn't generate. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Modal Runs",
        "url": "https://modalruns.com/",
        "description": "Learn the guitar fretboard by playing it: play any note and Modal Runs lights it up on the neck in real time — through your mic — and tells you when you land the note it asked for. Every mode in every key, learned by ear instead of memorised.",
        "applicationCategory": "MusicApplication",
        "operatingSystem": "Any (runs in a web browser)",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "browserRequirements": "Requires JavaScript and microphone access",
        "featureList": [
          "Drone playback in any key and mode",
          "Real-time pitch detection through the microphone",
          "Interactive fretboard visualization mapping every guitar neck note for scales, chords, and diatonic harmony",
          "Guided practice for all seven modes of the major scale"
        ]
      }
    </script>

    <!-- Vercel Web Analytics. Plain script instead of @vercel/analytics so the
         zero-runtime-dependency rule holds; 404s harmlessly in local dev. -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments) }
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <!-- Brand splash + prerendered hero: a real fretboard (rendered from the
         theory engine at build time — see scripts/modePages.ts, which fills
         the HERO marker below) paints straight from static HTML, so First/
         Largest Contentful Paint land real content before ANY JavaScript.
         React removes the whole layer on first render. All-inline so it
         needs no bundle, no font, no extra request. -->
    <style>
      #splash { position: fixed; inset: 0; z-index: 999; display: grid; place-items: center;
                background: #050507; transition: opacity 0.35s ease; padding: 22px; box-sizing: border-box; }
      #splash.done { opacity: 0; pointer-events: none; }
      .splash-hero { display: flex; flex-direction: column; align-items: center; gap: 16px;
                     width: 100%; max-width: 720px; }
      .splash-mark { width: 84px; height: 84px;
                     filter: drop-shadow(0 0 24px rgba(152,70,234,0.6));
                     animation: splash-pulse 1.3s ease-in-out infinite; }
      .splash-tag { margin: 0; color: #b9b3d0; font-family: system-ui, -apple-system, sans-serif;
                    font-size: 15px; line-height: 1.4; text-align: center; }
      .splash-board { width: 100%; }
      .splash-board svg { width: 100%; height: auto; display: block; border-radius: 10px; }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50%      { transform: scale(1.08); opacity: 1; }
      }
    </style>
    <div id="splash">
      <div class="splash-hero">
        <img class="splash-mark" src="/mark.webp" alt="" width="84" height="84" />
        <p class="splash-tag">Play any note — it lights up on the neck, in real time.</p>
        <!--PRERENDERED_HERO-->
      </div>
    </div>
    <div id="root"></div>
    <!-- For crawlers and agents that don't run JavaScript (most AI crawlers
         don't): the pitch in plain HTML, plus the door into the static
         mode-page cluster under /modes/. -->
    <noscript>
      <h1>Modal Runs — learn the guitar fretboard by playing it</h1>
      <p>Learn the fretboard by playing it: hold a drone in any
         key, improvise over it, and Modal Runs hears you through your mic —
         lighting up every note you play on the guitar neck and telling you
         when you land the note it asked for. Learn the modes by ear instead
         of memorising them. Free, in the browser, no signup.</p>
      <p><a href="/modes/">Fretboard visualizations for every mode in every key</a></p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
