<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- ═══════════════════════════════════════════════════════════════
         TODO: LAUNCH — REMOVE THIS BLOCK TO GO PUBLIC
         Keeps modalruns.com out of search results while we test in prod.
         Paired with: vercel.json (X-Robots-Tag header) + public/robots.txt
         See LAUNCH_CHECKLIST.md
         ═══════════════════════════════════════════════════════════════ -->
    <meta name="robots" content="noindex, nofollow" />
    <!-- END TODO: LAUNCH -->

    <title>Modal Runs — Drone-Led Guitar Practice</title>
    <meta name="description" content="An evolving modal drone, and a fretboard that shows you exactly what to play over it. Scales, modes, arpeggios and technique patterns across the whole neck. Free." />
    <link rel="canonical" href="https://modalruns.com/" />
    <meta name="theme-color" content="#050507" />

    <!-- Icons. favicon.ico is listed because browsers blind-request /favicon.ico
         regardless of what's declared here. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://modalruns.com/" />
    <meta property="og:site_name" content="Modal Runs" />
    <meta property="og:title" content="Modal Runs — Drone-Led Guitar Practice" />
    <meta property="og:description" content="An evolving modal drone, and a neck that shows you what to play over it. Modes, arpeggios & technique across the whole fretboard." />
    <!-- JPEG, not PNG: WhatsApp silently drops preview images over ~300KB and the
         PNG was 316KB. This is 103KB, so the card actually renders in chat. -->
    <meta property="og:image" content="https://modalruns.com/og.jpg" />
    <meta property="og:image:secure_url" content="https://modalruns.com/og.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Modal Runs — a fretboard lit up with the notes of a mode" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Modal Runs — Drone-Led Guitar Practice" />
    <meta name="twitter:description" content="An evolving modal drone, and a neck that shows you what to play over it." />
    <meta name="twitter:image" content="https://modalruns.com/og.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
