<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <title>Modal Runs — It listens while you play</title>
    <meta name="description" content="Hold a drone in any key, improvise over it, and Modal Runs hears you through your mic — lighting up what you played and telling you when you land the note it asked for. Find the modes by ear instead of memorising them. Free." />
    <link rel="canonical" href="https://modalruns.com/" />
    <meta name="theme-color" content="#050507" />

    <!-- Icons. favicon.ico is listed because browsers blind-request /favicon.ico
         regardless of what's declared here. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://modalruns.com/" />
    <meta property="og:site_name" content="Modal Runs" />
    <meta property="og:title" content="Modal Runs — It listens while you play" />
    <meta property="og:description" content="Hold a drone in any key, improvise, and it hears you through your mic — answering on the neck. Find the modes by ear." />
    <!-- JPEG, not PNG: WhatsApp silently drops preview images over ~300KB and the
         PNG was 316KB. This is 103KB, so the card actually renders in chat. -->
    <meta property="og:image" content="https://modalruns.com/og.jpg" />
    <meta property="og:image:secure_url" content="https://modalruns.com/og.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Modal Runs — a fretboard lit up with the notes of a mode" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Modal Runs — It listens while you play" />
    <meta name="twitter:description" content="Hold a drone in any key, improvise, and it hears you through your mic — answering on the neck." />
    <meta name="twitter:image" content="https://modalruns.com/og.jpg" />

    <!-- Vercel Web Analytics. Plain script instead of @vercel/analytics so the
         zero-runtime-dependency rule holds; 404s harmlessly in local dev. -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments) }
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <!-- Brand splash: the mark breathes while the bundle loads. Inline so it
         paints before ANY JavaScript; React removes it on first render. -->
    <style>
      #splash { position: fixed; inset: 0; z-index: 999; display: grid; place-items: center;
                background: #050507; transition: opacity 0.35s ease; }
      #splash.done { opacity: 0; pointer-events: none; }
      #splash img { width: 110px; height: 110px;
                    filter: drop-shadow(0 0 24px rgba(152,70,234,0.6));
                    animation: splash-pulse 1.3s ease-in-out infinite; }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50%      { transform: scale(1.08); opacity: 1; }
      }
    </style>
    <div id="splash"><img src="/mark.png" alt="" /></div>
    <div id="root"></div>
    <!-- For crawlers and agents that don't run JavaScript (most AI crawlers
         don't): the pitch in plain HTML, plus the door into the static
         mode-page cluster under /modes/. -->
    <noscript>
      <h1>Modal Runs — a guitar practice tool that listens</h1>
      <p>Hold a drone in any key, improvise over it, and Modal Runs hears you
         through your mic — lighting up what you played on an interactive
         fretboard and telling you when you land the note it asked for.
         Learn the modes by ear instead of memorising them. Free, in the
         browser, no signup.</p>
      <p><a href="/modes/">Fretboard maps for every mode in every key</a></p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
